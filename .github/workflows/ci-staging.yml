name: CI – Staging

on:
  pull_request:
    branches:
      - staging

jobs:
  ci-staging:
    name: Build & Push Staging Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linting tools
        run: npm install --save-dev htmlhint stylelint stylelint-config-standard

      - name: Lint HTML with HTMLHint
        run: npx htmlhint "*.html"

      - name: Lint CSS with Stylelint
        run: npx stylelint "*.css"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            inshaalbutt/pakvista:staging-latest
            inshaalbutt/pakvista:staging-${{ github.sha }}

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            inshaalbutt/pakvista:staging-latest
            inshaalbutt/pakvista:staging-${{ github.sha }}
