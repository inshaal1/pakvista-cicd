name: CI – Production

on:
  pull_request:
    branches:
      - main

jobs:
  ci-prod:
    name: Build & Push Prod Image
    runs-on: ubuntu-latest

    steps:
      # Step 1 – Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 – Lint HTML & CSS
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linting tools
        run: npm install --save-dev htmlhint stylelint stylelint-config-standard

      - name: Lint HTML with HTMLHint
        run: npx htmlhint "*.html"

      - name: Lint CSS with Stylelint
        run: npx stylelint "*.css"

      # Step 3 – Docker Login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4 – Build Image (no push)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            inshaalbutt/pakvista:prod-latest
            inshaalbutt/pakvista:prod-${{ github.sha }}

      # Step 5 & 6 – Tag & Push Image
      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            inshaalbutt/pakvista:prod-latest
            inshaalbutt/pakvista:prod-${{ github.sha }}
